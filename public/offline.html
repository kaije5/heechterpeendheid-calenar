<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Calenar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Mono', monospace;
      background: #f5f3ef;
      min-height: 100vh;
      display: flex;
      flex-col items-center justify-center;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 400px; }
    h1 { font-size: 2rem; color: #0a0a0a; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: -0.02em; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 2rem;
      border: 4px solid #0a0a0a; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 4px 4px 0 #0a0a0a;
    }
    .icon svg { width: 40px; height: 40px; }
    p { color: #666; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      display: inline-block; padding: 1rem 2rem;
      background: #0a0a0a; color: #fff; text-decoration: none;
      font-weight: bold; text-transform: uppercase; font-size: 0.875rem;
      border: 4px solid #0a0a0a; box-shadow: 4px 4px 0 #0a0a0a;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #0a0a0a; }
    .pending {
      margin-top: 2rem; padding: 1rem; background: #fff3cd;
      border: 4px solid #0a0a0a; font-size: 0.875rem; display: none;
    }
    .pending.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection. Calendar data saved locally, will sync when back online.</p>
    <a href="/" class="btn">Try Again</a>
    <div id="pending" class="pending">
      <strong>Pending:</strong> <span id="pending-count">0</span> event(s) waiting to sync
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.controller?.postMessage({ type: 'GET_PENDING_COUNT' });
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'PENDING_COUNT') {
          const count = event.data.count;
          if (count > 0) {
            document.getElementById('pending').classList.add('show');
            document.getElementById('pending-count').textContent = count;
          }
        }
      });
    }
  <\/script>
</body>
</html>
